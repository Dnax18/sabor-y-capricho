<!DOCTYPE html>
<html lang="es">

</head>
<body>

  <div id="app">

    <nav id="nav-bar">
      <button class="nav-btn active" data-section="dashboard">Inicio</button>

      <button class="nav-btn" data-section="inventario">Stock</button>

  </div>

  <script src="app.js"></script>

  <div id="sticky-order"></div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service worker registrado'))
          .catch(err => console.log('Error al registrar:', err));
      });
    }
  </script>
